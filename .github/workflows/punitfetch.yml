name: 🖥️ punitfetch — Update Profile Card

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/generate.js"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: node scripts/generate.js
      - name: Commit if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "punitfetch-bot"
          git add profile-card.svg README.md
          git diff --staged --quiet || git commit -m "chore: 🤖 refresh punitfetch card [skip ci]"
          git push
